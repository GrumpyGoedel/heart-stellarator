services:
  heart:
    build:
      context: .
      dockerfile: Dockerfile
    image: heart-stellarator:latest
    container_name: heart
    volumes:
      - ./:/work
    working_dir: /work
    environment:
      MPLBACKEND: Agg
      OMP_NUM_THREADS: "4"
    command: ["python", "/work/heart_stellarator.py"]

  heart-gif:
    image: heart-stellarator:latest
    container_name: heart-gif
    volumes:
      - ./:/work
    working_dir: /work
    environment:
      MPLBACKEND: Agg
      OMP_NUM_THREADS: "4"
    command: ["python", "/work/heart_stellarator.py", "--gif"]
